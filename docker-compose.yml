name: telco-regulator-pipeline

services:
  postgres:
    image: postgres:16
    container_name: telco_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-telco_admin}
      POSTGRES_PASSWORD: ${TELCO_POSTGRES_PASSWORD:?set TELCO_POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-telco_warehouse}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-telco_admin} -d ${POSTGRES_DB:-telco_warehouse}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - telco_net

  minio:
    image: minio/minio:RELEASE.2025-10-15T17-29-55Z
    container_name: telco_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${TELCO_MINIO_ROOT_USER:?set TELCO_MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${TELCO_MINIO_ROOT_PASSWORD:?set TELCO_MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - telco_net

  minio_init:
    image: minio/mc:latest
    container_name: telco_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${TELCO_MINIO_ROOT_USER:?set TELCO_MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${TELCO_MINIO_ROOT_PASSWORD:?set TELCO_MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/landing;
      mc mb --ignore-existing local/quarantine;
      mc mb --ignore-existing local/processed;
      echo 'MinIO buckets initialized successfully';
      exit 0;
      "
    networks:
      - telco_net

  airflow_postgres:
    image: postgres:16
    container_name: telco_airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:?set AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - telco_net

  airflow_init:
    image: apache/airflow:2.10.3-python3.11
    container_name: telco_airflow_init
    depends_on:
      airflow_postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:?set AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:?set AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:?set AIRFLOW_ADMIN_PASSWORD}
    command: version
    restart: "no"
    networks:
      - telco_net

  airflow_webserver:
    image: apache/airflow:2.10.3-python3.11
    container_name: telco_airflow_webserver
    depends_on:
      airflow_postgres:
        condition: service_healthy
      airflow_init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:?set AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:?set AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
      PYTHONPATH: /opt/airflow/data_generator
      AIRFLOW_CONN_TELCO_WAREHOUSE: ${AIRFLOW_CONN_TELCO_WAREHOUSE:?set AIRFLOW_CONN_TELCO_WAREHOUSE}
      AIRFLOW_CONN_TELCO_MINIO: ${AIRFLOW_CONN_TELCO_MINIO:?set AIRFLOW_CONN_TELCO_MINIO}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/requirements.txt:/requirements.txt
      - ./data_generator:/opt/airflow/data_generator:ro
    ports:
      - "8080:8080"
    command: bash -c "pip install -r /requirements.txt && airflow webserver"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5
    restart: unless-stopped
    networks:
      - telco_net

  airflow_scheduler:
    image: apache/airflow:2.10.3-python3.11
    container_name: telco_airflow_scheduler
    depends_on:
      airflow_postgres:
        condition: service_healthy
      airflow_init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:?set AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:?set AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      PYTHONPATH: /opt/airflow/data_generator
      AIRFLOW_CONN_TELCO_WAREHOUSE: ${AIRFLOW_CONN_TELCO_WAREHOUSE:?set AIRFLOW_CONN_TELCO_WAREHOUSE}
      AIRFLOW_CONN_TELCO_MINIO: ${AIRFLOW_CONN_TELCO_MINIO:?set AIRFLOW_CONN_TELCO_MINIO}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/requirements.txt:/requirements.txt
      - ./data_generator:/opt/airflow/data_generator:ro
    command: bash -c "pip install -r /requirements.txt && airflow scheduler"
    restart: unless-stopped
    networks:
      - telco_net

volumes:
  postgres_data:
    name: telco_postgres_data
  minio_data:
    name: telco_minio_data
  airflow_postgres_data:
    name: telco_airflow_postgres_data

networks:
  telco_net:
    name: telco_network
    driver: bridge
